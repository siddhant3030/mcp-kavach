# DRAFT — conservative defaults, not legal advice. Requirement-by-requirement
# mapping is tracked in issue #15 (DPDP) / future issues (GDPR, HIPAA).
#
# Health-context pack: blocks the identifiers from the HIPAA Safe Harbor
# de-identification list that virelia can currently detect (names, phones,
# emails, IPs, account numbers, government IDs, dates of birth, addresses).
# "Lite" because the full Safe Harbor list needs NER and date handling virelia
# doesn't have yet — names/addresses/DOB here come from column-name heuristics
# (Tier 0) and are NOT caught in free text.
#
# Most conservative of the packs: anything detected that no rule covers is
# BLOCKED, and the confidence bar is lowered to catch more.
name: hipaa-lite
version: 1
defaults:
  # Fail closed, hard: health data leaks are not recoverable — block what we can't classify.
  unknown_entity_action: block
  # Lower bar than the other packs: in a health context, a false alarm is cheaper than a leak.
  min_confidence: 0.3
rules:
  # A leaked credential exposes the whole system, not one field — withhold the entire result.
  - id: secrets-kill
    entities: [AWS_ACCESS_KEY, GITHUB_TOKEN, JWT]
    action: block
    scope: result
    message: "The result contained a credential and was withheld entirely."
  # Safe Harbor: names are the first identifier on the list — block.
  - id: names-block
    entities: [PERSON_NAME]
    action: block
    message: "Names are blocked by the hipaa-lite policy pack."
  # Safe Harbor: phone numbers and email addresses are listed identifiers — block.
  - id: contact-block
    entities: [PHONE, EMAIL]
    action: block
    message: "Contact information is blocked by the hipaa-lite policy pack."
  # Safe Harbor: geographic detail and birth dates are listed identifiers — block.
  - id: location-dob-block
    entities: [ADDRESS, DOB]
    action: block
    message: "Addresses and dates of birth are blocked by the hipaa-lite policy pack."
  # Safe Harbor: account numbers (bank, card) are listed identifiers — block.
  - id: account-block
    entities: [BANK_ACCOUNT, CREDIT_CARD]
    action: block
    message: "Account numbers are blocked by the hipaa-lite policy pack."
  # Safe Harbor: government ID numbers (SSN-equivalents like Aadhaar, PAN) are listed — block.
  - id: govt-id-block
    entities: [AADHAAR, PAN, GOVT_ID]
    action: block
    message: "Government identifiers are blocked by the hipaa-lite policy pack."
  # Safe Harbor: IP addresses are explicitly on the list — block.
  - id: ip-block
    entities: [IP_ADDRESS]
    action: block
    message: "IP addresses are blocked by the hipaa-lite policy pack."
  # IFSC identifies a bank branch, not a patient — the one deliberate allow in this pack.
  - id: ifsc-allow
    entities: [IFSC]
    action: allow
