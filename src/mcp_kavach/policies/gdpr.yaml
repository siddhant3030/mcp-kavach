# DRAFT — conservative defaults, not legal advice. Requirement-by-requirement
# mapping is tracked in issue #15 (DPDP) / future issues (GDPR, HIPAA).
#
# EU-focused pack: under the GDPR, "personal data" is anything that can
# identify a person, directly or indirectly — so every personal-data entity
# kavach detects is at least masked, government and financial identifiers are
# blocked outright, and anything detected that no rule covers is masked
# (fail closed).
#
# Caveat: PERSON_NAME/ADDRESS/DOB detection comes from column-name heuristics
# (Tier 0) — a name typed in free text is NOT caught yet (NER is on the roadmap).
name: gdpr
version: 1
defaults:
  # Fail closed: an entity we detect but have no rule for still gets masked.
  unknown_entity_action: mask
  min_confidence: 0.4
rules:
  # Credentials are not personal data, but leaking them is always a breach — block.
  - id: secrets-block
    entities: [AWS_ACCESS_KEY, GITHUB_TOKEN, JWT]
    action: block
    message: "This field contained a credential and was blocked by policy."
  # Government-issued ID numbers identify one exact person — block, never mask.
  - id: govt-id-block
    entities: [AADHAAR, PAN, GOVT_ID]
    action: block
    message: "This field contained a government identifier and was blocked by the GDPR policy pack."
  # Card and bank account numbers enable financial fraud if leaked — block outright.
  - id: financial-block
    entities: [CREDIT_CARD, BANK_ACCOUNT]
    action: block
    message: "This field contained a financial identifier and was blocked by the GDPR policy pack."
  # A person's name is the most direct personal data there is — mask it.
  - id: names-mask
    entities: [PERSON_NAME]
    action: mask
  # Emails and phone numbers identify and reach a person — fully masked.
  - id: contact-mask
    entities: [EMAIL, PHONE]
    action: mask
  # EU courts treat IP addresses as personal data (they can identify a person) — mask.
  - id: ip-mask
    entities: [IP_ADDRESS]
    action: mask
  # Where someone lives and when they were born can re-identify them — remove entirely.
  - id: location-dob-redact
    entities: [ADDRESS, DOB]
    action: redact
  # IFSC identifies a bank branch, not a person — safe to pass through.
  - id: ifsc-allow
    entities: [IFSC]
    action: allow
